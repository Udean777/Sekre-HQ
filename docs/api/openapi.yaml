openapi: 3.0.3
info:
  title: Organization ERP Lite & Finance Hub API
  description: |
    Multi-tenant SaaS platform API for organization management, task tracking, event scheduling, and finance management.
    
    ## Authentication
    All endpoints (except auth) require JWT Bearer token in Authorization header.
    
    ## Multi-tenancy
    API automatically filters data based on organization_id from JWT token.
  version: 1.0.0
  contact:
    name: API Support
    email: support@sekre.app

servers:
  - url: http://localhost:8080/api/v1
    description: Local development
  - url: https://api-staging.sekre.app/api/v1
    description: Staging environment
  - url: https://api.sekre.app/api/v1
    description: Production environment

tags:
  - name: Auth
    description: Authentication and authorization
  - name: Organizations
    description: Organization management
  - name: Divisions
    description: Division management within organizations
  - name: Users
    description: User management
  - name: Tasks
    description: Task management (Kanban board)
  - name: Events
    description: Event scheduling and calendar
  - name: Finance
    description: Financial transactions and reporting

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: "Invalid request"
        message:
          type: string
          example: "Email already exists"
        code:
          type: string
          example: "DUPLICATE_EMAIL"

    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "HIMTI UNPAB"
        subdomain:
          type: string
          example: "himti"
        subscription_plan:
          type: string
          enum: [FREE, LITE, PRO]
          example: "FREE"
        created_at:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        full_name:
          type: string
          example: "Sajudin Ma'ruf"
        created_at:
          type: string
          format: date-time

    Division:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
          example: "Divisi IPTEK"
        created_at:
          type: string
          format: date-time

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        division_id:
          type: string
          format: uuid
        assignee_id:
          type: string
          format: uuid
        title:
          type: string
          example: "Setup proyektor untuk Goes To School"
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [TODO, IN_PROGRESS, DONE]
          example: "TODO"
        due_date:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Event:
      type: object
      properties:
        id:
          type: string
          format: uuid
        division_id:
          type: string
          format: uuid
        title:
          type: string
          example: "Sosialisasi SMK N1 Stabat"
        description:
          type: string
          nullable: true
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        location:
          type: string
          example: "Aula SMK N1 Stabat"
        created_at:
          type: string
          format: date-time

    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        division_id:
          type: string
          format: uuid
        event_id:
          type: string
          format: uuid
          nullable: true
        type:
          type: string
          enum: [INCOME, EXPENSE]
        amount:
          type: number
          format: decimal
          example: 150000
        description:
          type: string
          example: "Pembelian spanduk kegiatan"
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
          example: "PENDING"
        requested_by:
          type: string
          format: uuid
        approved_by:
          type: string
          format: uuid
          nullable: true
        receipt_url:
          type: string
          format: uri
          nullable: true
        created_at:
          type: string
          format: date-time

paths:
  # ==================== AUTH ====================
  /auth/register:
    post:
      tags: [Auth]
      summary: Register new organization
      description: Create new organization with owner account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - organization_name
                - subdomain
                - email
                - password
                - full_name
              properties:
                organization_name:
                  type: string
                  example: "HIMTI UNPAB"
                subdomain:
                  type: string
                  example: "himti"
                  pattern: "^[a-z0-9-]+$"
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                full_name:
                  type: string
      responses:
        '201':
          description: Organization created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  organization:
                    $ref: '#/components/schemas/Organization'
                  user:
                    $ref: '#/components/schemas/User'
                  token:
                    type: string
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login to organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - subdomain
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                subdomain:
                  type: string
                  description: Organization subdomain to login to
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'
                  organization:
                    $ref: '#/components/schemas/Organization'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ==================== ORGANIZATIONS ====================
  /organizations/me:
    get:
      tags: [Organizations]
      summary: Get current organization details
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Organization details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'

  # ==================== DIVISIONS ====================
  /divisions:
    get:
      tags: [Divisions]
      summary: List all divisions in organization
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of divisions
          content:
            application/json:
              schema:
                type: object
                properties:
                  divisions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Division'
                  total:
                    type: integer

    post:
      tags: [Divisions]
      summary: Create new division
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: "Divisi IPTEK"
      responses:
        '201':
          description: Division created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Division'
        '403':
          description: Division limit reached (FREE plan max 7)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /divisions/{id}:
    get:
      tags: [Divisions]
      summary: Get division by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Division details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Division'

    put:
      tags: [Divisions]
      summary: Update division
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Division updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Division'

    delete:
      tags: [Divisions]
      summary: Delete division
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Division deleted

  # ==================== TASKS ====================
  /tasks:
    get:
      tags: [Tasks]
      summary: List tasks
      security:
        - BearerAuth: []
      parameters:
        - name: division_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [TODO, IN_PROGRESS, DONE]
        - name: assignee_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  total:
                    type: integer

    post:
      tags: [Tasks]
      summary: Create new task
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - division_id
                - title
              properties:
                division_id:
                  type: string
                  format: uuid
                assignee_id:
                  type: string
                  format: uuid
                title:
                  type: string
                description:
                  type: string
                due_date:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

  /tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get task by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

    put:
      tags: [Tasks]
      summary: Update task
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [TODO, IN_PROGRESS, DONE]
                assignee_id:
                  type: string
                  format: uuid
                due_date:
                  type: string
                  format: date-time
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'

    delete:
      tags: [Tasks]
      summary: Delete task
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Task deleted

  # ==================== EVENTS ====================
  /events:
    get:
      tags: [Events]
      summary: List events
      security:
        - BearerAuth: []
      parameters:
        - name: division_id
          in: query
          schema:
            type: string
            format: uuid
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
                  total:
                    type: integer

    post:
      tags: [Events]
      summary: Create new event
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - division_id
                - title
                - start_time
                - end_time
              properties:
                division_id:
                  type: string
                  format: uuid
                title:
                  type: string
                description:
                  type: string
                start_time:
                  type: string
                  format: date-time
                end_time:
                  type: string
                  format: date-time
                location:
                  type: string
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'

  /events/{id}:
    get:
      tags: [Events]
      summary: Get event by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Event details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'

    put:
      tags: [Events]
      summary: Update event
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                start_time:
                  type: string
                  format: date-time
                end_time:
                  type: string
                  format: date-time
                location:
                  type: string
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'

    delete:
      tags: [Events]
      summary: Delete event
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Event deleted

  # ==================== FINANCE ====================
  /transactions:
    get:
      tags: [Finance]
      summary: List transactions
      security:
        - BearerAuth: []
      parameters:
        - name: division_id
          in: query
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          schema:
            type: string
            enum: [INCOME, EXPENSE]
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, APPROVED, REJECTED]
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'
                  total:
                    type: integer
                  summary:
                    type: object
                    properties:
                      total_income:
                        type: number
                      total_expense:
                        type: number
                      balance:
                        type: number

    post:
      tags: [Finance]
      summary: Create new transaction
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - division_id
                - type
                - amount
                - description
              properties:
                division_id:
                  type: string
                  format: uuid
                event_id:
                  type: string
                  format: uuid
                type:
                  type: string
                  enum: [INCOME, EXPENSE]
                amount:
                  type: number
                  format: decimal
                description:
                  type: string
                receipt_url:
                  type: string
                  format: uri
      responses:
        '201':
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'

  /transactions/{id}:
    get:
      tags: [Finance]
      summary: Get transaction by ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'

    put:
      tags: [Finance]
      summary: Update transaction
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                description:
                  type: string
                receipt_url:
                  type: string
      responses:
        '200':
          description: Transaction updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'

  /transactions/{id}/approve:
    post:
      tags: [Finance]
      summary: Approve transaction (Lite/Pro plan only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transaction approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '403':
          description: Feature not available in current plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /transactions/{id}/reject:
    post:
      tags: [Finance]
      summary: Reject transaction (Lite/Pro plan only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Transaction rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
