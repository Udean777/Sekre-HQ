  /members/bulk-import:
    post:
      tags: [Members]
      summary: Bulk import members from CSV
      description: |
        Imports multiple members from a CSV file.
        
        **Permissions:**
        - Requires OWNER or ADMIN role
        
        **Rate Limiting:**
        - 1 request per minute
        - Maximum 100 members per import
        
        **CSV Format:**
        - Headers: email, full_name, role, division_names (comma-separated)
        - Example: john@acme.com,John Doe,MEMBER,"Engineering,Marketing"
        
        **Behavior:**
        - Validates all rows before importing
        - Skips duplicate emails
        - Sends invitation emails to all new members
        - Returns summary of successful and failed imports
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV file with member data
      responses:
        '200':
          description: Import completed
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
              description: Rate limit (requests per minute)
            X-RateLimit-Remaining:
              schema:
                type: integer
              description: Remaining requests in current window
            X-RateLimit-Reset:
              schema:
                type: integer
              description: Unix timestamp when rate limit resets
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                    description: Total rows in CSV
                  successful:
                    type: integer
                    description: Successfully imported members
                  failed:
                    type: integer
                    description: Failed imports
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        row:
                          type: integer
                        email:
                          type: string
                        error:
                          type: string
              examples:
                success:
                  summary: Import completed with some errors
                  value:
                    total: 10
                    successful: 8
                    failed: 2
                    errors:
                      - row: 3
                        email: "invalid-email"
                        error: "Invalid email format"
                      - row: 7
                        email: "existing@acme.com"
                        error: "Email already registered"
        '400':
          description: Invalid CSV format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_csv:
                  summary: Invalid CSV format
                  value:
                    error:
                      code: "INVALID_INPUT"
                      message: "Invalid CSV format"
                      details:
                        - field: "file"
                          message: "CSV must have headers: email, full_name, role, division_names"
                too_many_rows:
                  summary: Too many rows
                  value:
                    error:
                      code: "INVALID_INPUT"
                      message: "CSV exceeds maximum of 100 rows"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

