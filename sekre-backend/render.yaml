services:
  # ── STAGING (branch: dev) ─────────────────────────────────────────────────
  - type: web
    name: sekre-backend-staging
    runtime: docker
    branch: dev
    rootDir: sekre-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SERVER_PORT
        value: 1000
      - key: SERVER_ENV
        value: staging
      - key: SERVER_READ_TIMEOUT
        value: 15
      - key: SERVER_WRITE_TIMEOUT
        value: 15
      - key: SERVER_SHUTDOWN_TIMEOUT
        value: 30
      - key: DB_HOST
        fromDatabase:
          name: sekre-db-staging
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sekre-db-staging
          property: port
      - key: DB_USER
        fromDatabase:
          name: sekre-db-staging
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sekre-db-staging
          property: password
      - key: DB_NAME
        fromDatabase:
          name: sekre-db-staging
          property: database
      - key: DB_SSLMODE
        value: require
      - key: DB_MAX_OPEN_CONNS
        value: 25
      - key: DB_MAX_IDLE_CONNS
        value: 5
      - key: DB_CONN_MAX_LIFETIME
        value: 3600
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15
      - key: JWT_REFRESH_EXPIRY
        value: 10080
      - key: LOG_LEVEL
        value: debug
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_METHODS
        value: GET,POST,PUT,PATCH,DELETE,OPTIONS
      - key: CORS_ALLOWED_HEADERS
        value: Content-Type,Authorization,Accept,X-Request-ID
      - key: CORS_EXPOSED_HEADERS
        value: X-Request-ID
      - key: CORS_ALLOW_CREDENTIALS
        value: true
      - key: CORS_MAX_AGE
        value: 3600
      - key: CLEANUP_REFRESH_SESSION_RETENTION_DAYS
        value: 7
      - key: CLEANUP_AUDIT_LOG_RETENTION_DAYS
        value: 90
      - key: SELF_PING_URL
        sync: false

  # ── PRODUCTION (branch: main) ─────────────────────────────────────────────
  - type: web
    name: sekre-backend
    runtime: docker
    branch: main
    rootDir: sekre-backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SERVER_PORT
        value: 1000
      - key: SERVER_ENV
        value: production
      - key: SERVER_READ_TIMEOUT
        value: 15
      - key: SERVER_WRITE_TIMEOUT
        value: 15
      - key: SERVER_SHUTDOWN_TIMEOUT
        value: 30
      - key: DB_HOST
        fromDatabase:
          name: sekre-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sekre-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: sekre-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sekre-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: sekre-db
          property: database
      - key: DB_SSLMODE
        value: require
      - key: DB_MAX_OPEN_CONNS
        value: 25
      - key: DB_MAX_IDLE_CONNS
        value: 5
      - key: DB_CONN_MAX_LIFETIME
        value: 3600
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15
      - key: JWT_REFRESH_EXPIRY
        value: 10080
      - key: LOG_LEVEL
        value: info
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_ALLOWED_METHODS
        value: GET,POST,PUT,PATCH,DELETE,OPTIONS
      - key: CORS_ALLOWED_HEADERS
        value: Content-Type,Authorization,Accept,X-Request-ID
      - key: CORS_EXPOSED_HEADERS
        value: X-Request-ID
      - key: CORS_ALLOW_CREDENTIALS
        value: true
      - key: CORS_MAX_AGE
        value: 3600
      - key: CLEANUP_REFRESH_SESSION_RETENTION_DAYS
        value: 7
      - key: CLEANUP_AUDIT_LOG_RETENTION_DAYS
        value: 90
      - key: SELF_PING_URL
        sync: false

databases:
  # ── STAGING DB ────────────────────────────────────────────────────────────
  - name: sekre-db-staging
    plan: free
    databaseName: sekre_db_staging
    user: sekre_user_staging

  # ── PRODUCTION DB ─────────────────────────────────────────────────────────
  - name: sekre-db
    plan: free
    databaseName: sekre_db
    user: sekre_user
