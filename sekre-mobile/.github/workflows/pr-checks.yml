name: PR Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ─── Static checks: TypeScript + Lint + Test ─────────────────────────────────
  checks:
    name: TypeScript + Lint + Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript check
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test --passWithNoTests

  # ─── Bundle budget enforcement ───────────────────────────────────────────────
  # Generate prod bundle (Android) dan fail kalau size/module count melebihi
  # budget di bundle-budget.json. Mencegah bundle bloat masuk main tanpa review.
  #
  # iOS budget di-skip di PR check karena butuh macos runner ($$$) — di-cek
  # di workflow release saja.
  bundle-budget:
    name: Bundle Budget (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check Android bundle budget
        run: bun run check-bundle-budget -- --platform=android

  # ─── iOS build sanity check ─────────────────────────────────────────────────
  # Verify Podfile + Pods install + Xcode build succeeds di PR.
  # Pakai macos runner — slower + more expensive, jadi di-skip kalau PR
  # tidak touch ios/ atau dependencies.
  ios-build:
    name: iOS Build (Pods + Xcode)
    runs-on: macos-14
    timeout-minutes: 45
    # Hanya run kalau ada perubahan yang affect iOS build
    if: |
      contains(github.event.pull_request.changed_files, 'ios/') ||
      contains(github.event.pull_request.changed_files, 'package.json') ||
      contains(github.event.pull_request.changed_files, 'bun.lockb') ||
      contains(github.event.pull_request.changed_files, '.github/workflows/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Install Pods
        working-directory: ios
        run: pod install --repo-update

      - name: Xcode build (Debug, no codesign)
        working-directory: ios
        run: |
          xcodebuild \
            -workspace SekreMobile.xcworkspace \
            -scheme SekreMobile \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build | xcpretty
