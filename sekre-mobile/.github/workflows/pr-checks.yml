name: PR Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-checks-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: TypeScript + Lint + Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Setup Bun ────────────────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── Cache node_modules ───────────────────────────────────────────────────
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── TypeScript ───────────────────────────────────────────────────────────
      - name: TypeScript check
        run: bunx tsc --noEmit

      # ── Lint ─────────────────────────────────────────────────────────────────
      - name: Lint
        run: bun run lint

      # ── Test ─────────────────────────────────────────────────────────────────
      - name: Test
        run: bun test --passWithNoTests
