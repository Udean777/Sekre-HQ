name: Android Release + Sentry Source Maps

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-release:
    name: Build Android Release + Upload Source Maps
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Setup Java (Gradle needs JDK 17) ────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Setup Bun ────────────────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── Cache node_modules ───────────────────────────────────────────────────
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── Cache Gradle ─────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Setup Android SDK ────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Read version from build.gradle ───────────────────────────────────────
      - name: Read app version
        id: version
        run: |
          VERSION_NAME=$(grep versionName android/app/build.gradle | head -1 | awk -F'"' '{print $2}')
          VERSION_CODE=$(grep versionCode android/app/build.gradle | head -1 | awk '{print $2}')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "release=$VERSION_NAME+$VERSION_CODE" >> $GITHUB_OUTPUT

      # ── Build release AAB ────────────────────────────────────────────────────
      - name: Build release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon
        env:
          # Keystore signing — set di GitHub Secrets
          KEYSTORE_FILE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}

      # ── Create Sentry release ────────────────────────────────────────────────
      - name: Create Sentry release
        run: |
          bunx sentry-cli releases new "${{ steps.version.outputs.release }}"
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      # ── Upload Android source maps ───────────────────────────────────────────
      - name: Upload Android source maps to Sentry
        run: |
          bunx sentry-cli releases files "${{ steps.version.outputs.release }}" \
            upload-sourcemaps \
            --dist "${{ steps.version.outputs.version_code }}" \
            --rewrite \
            android/app/build/generated/sourcemaps/react/release/index.android.bundle.map
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      # ── Finalize Sentry release ──────────────────────────────────────────────
      - name: Finalize Sentry release
        run: |
          bunx sentry-cli releases finalize "${{ steps.version.outputs.release }}"
          bunx sentry-cli releases deploys "${{ steps.version.outputs.release }}" new -e production
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}

      # ── Upload AAB artifact ──────────────────────────────────────────────────
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: sekre-release-${{ steps.version.outputs.release }}
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
