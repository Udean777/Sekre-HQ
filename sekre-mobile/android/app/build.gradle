apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. Default is "debug", "debugOptimized".
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "liteDebugOptimized", "prodDebug", "prodDebugOptimized"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = true

/**
 * Set this to true to enable resource shrinking on Release builds.
 * Removes unused resources (drawables, layouts, strings, etc) detected by R8.
 * Requires minifyEnabled = true.
 */
def enableShrinkResourcesInReleaseBuilds = true

/**
 * Set this to true to generate per-ABI APKs (one APK per architecture).
 * Each split APK is ~30-40% smaller than the universal APK.
 * The AAB build is unaffected — Play Store always serves per-device APKs.
 */
def enableSeparateBuildPerCPUArchitecture = true

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

// Release signing properties are loaded from:
// 1. Gradle project properties (CI injects into android/gradle.properties)
// 2. android/local.properties (recommended for local development, gitignored)
// 3. Environment variables
//
// Expected keys:
// - MYAPP_UPLOAD_STORE_FILE
// - MYAPP_UPLOAD_KEY_ALIAS
// - MYAPP_UPLOAD_STORE_PASSWORD
// - MYAPP_UPLOAD_KEY_PASSWORD
def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { stream ->
        localProperties.load(stream)
    }
}

def signingProperty = { name ->
    def value = project.findProperty(name)
    if (value != null) {
        return value.toString()
    }

    value = localProperties.getProperty(name)
    if (value != null) {
        return value
    }

    value = System.getenv(name)
    if (value != null) {
        return value
    }

    return null
}

def releaseStoreFile = signingProperty('MYAPP_UPLOAD_STORE_FILE')
def releaseKeyAlias = signingProperty('MYAPP_UPLOAD_KEY_ALIAS')
def releaseStorePassword = signingProperty('MYAPP_UPLOAD_STORE_PASSWORD')
def releaseKeyPassword = signingProperty('MYAPP_UPLOAD_KEY_PASSWORD')

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.sekremobile"
    defaultConfig {
        applicationId "com.sekremobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    // Generate per-ABI APKs to drastically reduce APK size.
    // Each user only needs the APK matching their device architecture.
    // Only ARM architectures — x86/x86_64 dropped (emulator-only, not real devices).
    //
    // NOTE: ABI splits are automatically disabled when building an AAB
    // (`bundleRelease`). Play Store handles per-device delivery from the AAB,
    // so splits are only needed for direct APK distribution.
    def isBundleTask = gradle.startParameter.taskNames.any { it.toLowerCase().contains("bundle") }
    splits {
        abi {
            reset()
            enable enableSeparateBuildPerCPUArchitecture && !isBundleTask
            universalApk false  // set true if you also want a fat APK
            include "armeabi-v7a", "arm64-v8a"
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            storeFile file(releaseStoreFile)
            storePassword releaseStorePassword
            keyAlias releaseKeyAlias
            keyPassword releaseKeyPassword
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources (enableProguardInReleaseBuilds && enableShrinkResourcesInReleaseBuilds)
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    // Map each per-ABI APK to a unique versionCode so Play Store can
    // distinguish between them. Order must match the include list above.
    project.ext.versionCodes = [
        "armeabi-v7a": 1,
        "arm64-v8a"  : 2
    ]

    applicationVariants.all { variant ->
        variant.outputs.each { output ->
            def abi = output.getFilter(com.android.build.OutputFile.ABI)
            if (abi != null) {
                output.versionCodeOverride =
                    project.ext.versionCodes.get(abi) * 1048576 + defaultConfig.versionCode
            }
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
