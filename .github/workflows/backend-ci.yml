name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - 'sekre-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'sekre-backend/**'
      - '.github/workflows/backend-ci.yml'

defaults:
  run:
    working-directory: sekre-backend

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint + Test + Build
  # ─────────────────────────────────────────────
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: sekre-backend/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: sekre-backend

      - name: Run unit tests
        run: make test-unit

      - name: Run integration tests
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
          TESTCONTAINERS_RYUK_DISABLED: true
        run: make test-integration

      - name: Build binary
        run: make build

      - name: Verify binary runs
        run: ./bin/api --help || true

  # ─────────────────────────────────────────────
  # Job 2: Build & push Docker image to GHCR
  # ─────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push (GHCR)
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/sekre-backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: sekre-backend
          file: sekre-backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 3: Deploy to Render
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [ci]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      deployments: write
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Create GitHub Deployment (shows in commit timeline) ──
      - name: Create GitHub deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Deploy sekre-backend to Render',
              auto_merge: false,
              required_contexts: [],
            });
            core.setOutput('deployment_id', deployment.data.id);

      # ── Mark deployment as in_progress ──
      - name: Set deployment status — in progress
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'in_progress',
              description: 'Deploying to Render...',
            });

      # ── Trigger Render deploy hook ──
      - name: Deploy to Render
        id: deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          RENDER_SERVICE_URL: ${{ secrets.RENDER_SERVICE_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK_URL secret is not set — skipping deploy trigger."
            echo "url=${RENDER_SERVICE_URL}" >> $GITHUB_OUTPUT
            exit 0
          fi
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$RENDER_DEPLOY_HOOK_URL")
          if [ "$RESPONSE" != "200" ] && [ "$RESPONSE" != "201" ]; then
            echo "Deploy hook returned HTTP $RESPONSE"
            exit 1
          fi
          echo "url=${RENDER_SERVICE_URL}" >> $GITHUB_OUTPUT

      # ── Mark deployment as success ──
      - name: Set deployment status — success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'success',
              description: 'Deployed successfully to Render',
              environment_url: '${{ steps.deploy.outputs.url }}',
            });

      # ── Mark deployment as failure ──
      - name: Set deployment status — failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'failure',
              description: 'Deployment to Render failed',
            });

# ─────────────────────────────────────────────────────────────────
