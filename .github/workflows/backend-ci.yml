name: Backend CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'sekre-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'sekre-backend/**'

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sekre_user
          POSTGRES_PASSWORD: sekre_password
          POSTGRES_DB: sekre_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: sekre-backend/go.sum

      - name: Install dependencies
        working-directory: sekre-backend
        run: go mod download

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          working-directory: sekre-backend

      - name: Initialize test database
        env:
          PGPASSWORD: sekre_password
        run: |
          psql -h localhost -U sekre_user -d sekre_db_test -f scripts/init-db.sql

      - name: Run tests
        working-directory: sekre-backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: sekre_user
          DB_PASSWORD: sekre_password
          DB_NAME: sekre_db_test
          DB_SSLMODE: disable
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret-key
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./sekre-backend/coverage.out
          flags: backend

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binary
        working-directory: sekre-backend
        run: |
          CGO_ENABLED=0 GOOS=linux go build -a -installsuffix cgo -o bin/api cmd/api/main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: sekre-backend/bin/api
          retention-days: 7
