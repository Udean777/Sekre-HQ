name: PR Checks

on:
  pull_request:
    branches: [main, dev]

jobs:
  pr-title-check:
    name: Check PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title follows conventional commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            ci
          requireScope: false

  changed-files:
    name: Detect Changed Files
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'sekre-backend/**'
            frontend:
              - 'sekre-frontend/**'
            mobile:
              - 'sekre-mobile/**'

  summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [changed-files]
    steps:
      - name: Comment PR with changes
        uses: actions/github-script@v7
        with:
          script: |
            const backend = '${{ needs.changed-files.outputs.backend }}' === 'true';
            const frontend = '${{ needs.changed-files.outputs.frontend }}' === 'true';
            const mobile = '${{ needs.changed-files.outputs.mobile }}' === 'true';
            
            let message = '## 🔍 Changed Components\n\n';
            
            if (backend) message += '- ✅ Backend\n';
            if (frontend) message += '- ✅ Frontend\n';
            if (mobile) message += '- ✅ Mobile\n';
            
            if (!backend && !frontend && !mobile) {
              message += '- 📝 Documentation or configuration only\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
