name: Frontend CI

on:
  push:
    branches: [main, dev]
    paths:
      - 'sekre-frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'sekre-frontend/**'

jobs:
  lint-and-test:
    name: Lint, Type Check, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: sekre-frontend
        run: bun install --frozen-lockfile

      - name: Run linter
        working-directory: sekre-frontend
        run: bun run lint

      - name: Run type check
        working-directory: sekre-frontend
        run: bun run check

      - name: Run tests
        working-directory: sekre-frontend
        run: bun test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: sekre-frontend
        run: bun install --frozen-lockfile

      - name: Build application
        working-directory: sekre-frontend
        run: bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: sekre-frontend/build
          retention-days: 7
